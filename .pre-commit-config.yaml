---
repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
      # - id: identity  # Prints all files passed to pre-commits. Debugging.
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.23.0
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/lyz-code/yamlfix
    rev: 1.19.1
    hooks:
      - id: yamlfix
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args:
          - --maxkb=10000
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-merge-conflict
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
        types:
          - text
      - id: mixed-line-ending
        args:
          - --fix=lf
        description: Forces to replace line ending by the UNIX 'lf' character.
      - id: no-commit-to-branch
        args:
          - --branch
          - main
      - id: trailing-whitespace
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args:
          - --fix
        types_or:
          - jupyter
          - pyi
          - python
      - id: ruff-format
        types_or:
          - jupyter
          - pyi
          - python
  - repo: local
    hooks:
      - id: ty
        name: ty (numpy backend)
        # The workspace's subprojects are gitignored here, so the official
        # ty-pre-commit hook (which only receives git-tracked changed files)
        # would never see them. Run ty over the whole workspace instead,
        # resolving third-party imports from the py314 env. Keep the pin in
        # sync with the family's `ty-pre-commit` rev.
        language: python
        additional_dependencies:
          - ty==0.0.49
        entry: ty check --python .pixi/envs/py314
        pass_filenames: false
        always_run: true
        require_serial: true
      - id: ty-jax
        name: ty (jax backend)
        # Same `tool.ty` configuration; only the environment ty resolves
        # third-party imports from is overridden to the jax env.
        language: python
        additional_dependencies:
          - ty==0.0.49
        entry: ty check --python .pixi/envs/py314-jax
        pass_filenames: false
        always_run: true
        require_serial: true
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-gfm-alerts
          - mdformat-ruff
        args:
          - --wrap
          - '88'
        files: (AGENTS\.md|CLAUDE\.md|README\.md|CHANGES\.md|CODE_OF_CONDUCT\.md|modules/.*\.md|profiles/.*\.md)
ci:
  autoupdate_schedule: monthly
  # pre-commit.ci blocks network access at hook runtime and has no pixi
  # environments; type checking runs locally.
  skip:
    - ty
    - ty-jax
